[build]
  # Flat repo — HTML files live at root, no build step needed.
  # Cleanup command runs in Netlify's build environment to strip dev-only files
  # so they don't ship to the CDN. Local repo is untouched.
  # Note: `netlify/` is preserved — it holds the submission-created function (MY-71).
  command = "rm -rf dist 'JavaScript Scripts' 'Python Scripts' elementor-templates-2026-04-02 *.py *.sh *.bat *.xlsx MAG_Task_List_Context.md PUSH-TO-GITHUB.md CLAUDE.md BRAND_RULES.md ZOOM_BACKGROUNDS_USAGE.md ROB_AND_ELIZABETH_ACTIONS.* .claude recolor-*.js render-*.js contrast-audit.js || true"
  publish = "."

[functions]
  # MY-71: submission-created.mjs sends user confirmation emails via Resend.
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Limit referrer information to same-origin
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HSTS: enforce HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # Content Security Policy
    # Allows: same-origin HTML/CSS/JS, Google Fonts, Netlify Forms endpoint,
    #         Calendly embeds (for booking buttons), inline styles (needed for
    #         hero pattern SVG data URI), and form-action to Netlify.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src https://calendly.com; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"

    # Permissions Policy: disable features the site does not use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=(), ambient-light-sensor=(), autoplay=()"
