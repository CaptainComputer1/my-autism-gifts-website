<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  background:
    radial-gradient(ellipse at 20% 15%, rgba(120,95,160,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(55,40,80,0.4) 0%, transparent 60%),
    linear-gradient(155deg, #55436e 0%, #4A3B63 45%, #3d2f55 100%);
  position: relative;
}

/* Swooping MAG + butterfly (not butterfly alone) — small, bottom-right */
.logo-anchor {
  position: absolute;
  bottom: 45px;
  right: 55px;
  width: 150px;
  height: 150px;
  opacity: 0.92;
}
</style>
</head>
<body>
  <img class="logo-anchor" src="../../MAG%20Logo%20without%20BG%20(white%20text).png" alt="My Autism Gifts" />
</body>
</html>
