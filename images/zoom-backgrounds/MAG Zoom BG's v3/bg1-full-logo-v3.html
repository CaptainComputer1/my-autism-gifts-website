<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Vidaloka&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  font-family: 'Roboto', sans-serif;
  background:
    radial-gradient(ellipse at 75% 20%, rgba(210,204,255,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 85%, rgba(74,59,99,0.30) 0%, transparent 60%),
    linear-gradient(135deg, #1e2d45 0%, #2A3A56 50%, #3d2f55 100%);
  position: relative;
}

/* Swooping MAG logo + butterfly (transparent, no teal box) — upper right */
.logo-wrapper {
  position: absolute;
  top: 55px;
  right: 110px;
  width: 300px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo {
  position: relative;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Vertical tagline pinned to the very right edge */
.tagline {
  position: absolute;
  top: 50%;
  right: 30px;
  transform: translateY(-50%);
  writing-mode: vertical-rl;
  white-space: nowrap;
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
}
</style>
</head>
<body>
  <div class="logo-wrapper">
    <img class="logo" src="../../MAG%20Logo%20without%20BG%20(white%20text).png" alt="My Autism Gifts" />
  </div>
  <div class="tagline">Dream boldly · Embrace Your Diversity · Unleash Brilliance</div>
</body>
</html>
