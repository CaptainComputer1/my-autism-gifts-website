<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #2A3A56 0%, #33456a 30%, #4A3B63 70%, #3d2f55 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Radial glow behind the superhero */
body::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 35%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 900px;
  background: radial-gradient(circle, rgba(74,59,99,0.3) 0%, rgba(83,160,183,0.08) 40%, transparent 70%);
}

/* Starburst effect */
body::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 35%;
  transform: translate(-50%, -50%);
  width: 1200px;
  height: 1200px;
  background: conic-gradient(
    from 0deg,
    transparent 0deg, rgba(151,231,255,0.03) 10deg, transparent 20deg,
    transparent 40deg, rgba(210,204,255,0.03) 50deg, transparent 60deg,
    transparent 80deg, rgba(151,231,255,0.03) 90deg, transparent 100deg,
    transparent 120deg, rgba(210,204,255,0.03) 130deg, transparent 140deg,
    transparent 160deg, rgba(151,231,255,0.03) 170deg, transparent 180deg,
    transparent 200deg, rgba(210,204,255,0.03) 210deg, transparent 220deg,
    transparent 240deg, rgba(151,231,255,0.03) 250deg, transparent 260deg,
    transparent 280deg, rgba(210,204,255,0.03) 290deg, transparent 300deg,
    transparent 320deg, rgba(151,231,255,0.03) 330deg, transparent 340deg,
    transparent 360deg
  );
}

.layout {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 80px;
  width: 1920px;
  height: 1080px;
  padding: 40px 100px;
}

.hero-image {
  height: 820px;
  object-fit: contain;
  flex-shrink: 0;
  align-self: flex-end;
  border-radius: 24px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.4);
  background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(240,238,255,0.95) 100%);
  padding: 20px 30px 0 30px;
}

.text-side {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 24px;
  max-width: 700px;
}

.small-logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  border-radius: 50%;
  padding: 12px;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.brand-name {
  font-size: 52px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.15;
}

.brand-name span {
  color: #97E7FF;
}

.divider {
  width: 100px;
  height: 3px;
  background: linear-gradient(90deg, #97E7FF, #D2CCFF);
  border-radius: 2px;
}

.tagline {
  font-size: 26px;
  color: rgba(255,255,255,0.8);
  font-weight: 300;
  line-height: 1.5;
  letter-spacing: 1px;
}

.tagline em {
  color: #D2CCFF;
  font-style: normal;
  font-weight: 400;
}

.cta {
  margin-top: 12px;
  padding: 16px 40px;
  background: linear-gradient(135deg, #4A3B63, #5a4b73);
  color: #ffffff;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 8px;
  border: 1px solid rgba(210,204,255,0.3);
  box-shadow: 0 4px 20px rgba(74,59,99,0.4);
}

.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #53A0B7, #97E7FF, #D2CCFF, #4A3B63);
}

.corner-tl {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 60px;
  height: 60px;
  border-top: 2px solid rgba(151,231,255,0.2);
  border-right: 2px solid rgba(151,231,255,0.2);
}
</style>
</head>
<body>
  <div class="corner-tl"></div>

  <div class="layout">
    <img class="hero-image" src="../Autism%20Man%20without%20BG.png" alt="" />
    <div class="text-side">
      <img class="small-logo" src="../MAG%20Logo%20Square%20Icon%20without%20BG.png" alt="" />
      <div class="brand-name">My Autism <span>Gifts</span></div>
      <div class="divider"></div>
      <div class="tagline">
        Your neurodivergence is not the problem.<br/>
        <em>It might be your greatest asset.</em>
      </div>
      <div class="cta">myautismgifts.com</div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</body>
</html>
