<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Vidaloka&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  font-family: 'Roboto', sans-serif;
  /* Light purple per Meeting 8 feedback */
  background:
    radial-gradient(ellipse at 80% 25%, rgba(151,231,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 90%, rgba(255,255,255,0.35) 0%, transparent 55%),
    linear-gradient(135deg, #F9F5FF 0%, #D2CCFF 55%, #BFB6F5 100%);
  position: relative;
}

/* Text block — upper-right, but with contact clutter REMOVED per Meeting 8
   (Elizabeth: "they don't need a whole bunch of stuff on the Zoom screen") */
.text-block {
  position: absolute;
  top: 60px;
  right: 110px;
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}

.brand-name {
  font-family: 'Vidaloka', serif;
  font-size: 64px;
  color: #2A3A56;
  line-height: 1;
  letter-spacing: 1px;
}

.brand-name span {
  color: #4A3B63;
}

.divider {
  width: 90px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #4A3B63);
}

.role {
  font-family: 'Roboto', sans-serif;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #2A3A56;
}

.coach-name {
  font-family: 'Roboto', sans-serif;
  font-size: 22px;
  font-weight: 400;
  color: #4A3B63;
  letter-spacing: 2px;
}

/* Website kept (per Elizabeth: "They can see coach Rob / forward slash my autism gifts"),
   email/phone REMOVED */
.website {
  font-family: 'Roboto', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: #2A3A56;
  letter-spacing: 1px;
  margin-top: 6px;
}

/* MAG logo — upper-left per Meeting 8 (signature placement) */
.logo-anchor {
  position: absolute;
  top: 0px;
  left: 60px;
  width: 200px;
  height: 200px;
  object-fit: contain;
}
</style>
</head>
<body>
  <img class="logo-anchor" src="../../original-images-on-zoom-bgs/MAG%20Logo%20without%20BG.png" alt="My Autism Gifts" />
  <div class="text-block">
    <div class="brand-name">My Autism <span>Gifts</span></div>
    <div class="divider"></div>
    <div class="role">Chief Empowerment Officer</div>
    <div class="coach-name">Rob Hodes</div>
    <div class="website">myautismgifts.com/services</div>
  </div>
</body>
</html>
