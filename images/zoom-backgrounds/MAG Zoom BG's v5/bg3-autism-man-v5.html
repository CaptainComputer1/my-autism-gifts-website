<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Vidaloka&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  font-family: 'Roboto', sans-serif;
  /* Light purple per Meeting 8 */
  background:
    radial-gradient(ellipse at 25% 75%, rgba(151,231,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.35) 0%, transparent 55%),
    linear-gradient(135deg, #F9F5FF 0%, #D2CCFF 55%, #BFB6F5 100%);
  position: relative;
}

/* Ground glow under Autism Man (now tinted to harmonize with light bg) */
.ground-glow {
  position: absolute;
  bottom: 40px;
  left: 0px;
  width: 480px;
  height: 80px;
  background: radial-gradient(ellipse at center, rgba(74,59,99,0.20) 0%, transparent 70%);
  filter: blur(20px);
  pointer-events: none;
}

/* Autism Man — moved FURTHER LEFT per Sean's directive: cape just touches left edge.
   v3 used left: 80px; v5 uses left: -120px so cape (the leftmost part of the PNG)
   grazes x=0. height unchanged at 860px. */
.hero {
  position: absolute;
  bottom: 40px;
  left: -120px;
  height: 860px;
  width: auto;
  filter: drop-shadow(0 10px 40px rgba(0,0,0,0.35));
  pointer-events: none;
}

/* MAG logo — upper right, prominent brand mark */
.logo-wrapper {
  position: absolute;
  top: 70px;
  right: 110px;
  width: 340px;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>
<body>
  <div class="ground-glow"></div>
  <img class="hero" src="../../original-images-unused/Autism%20Man%20without%20BG.png" alt="" />
  <div class="logo-wrapper">
    <img class="logo" src="../../original-images-unused/MAG%20Logo%20without%20BG.png" alt="My Autism Gifts" />
  </div>
</body>
</html>
