<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Vidaloka&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  font-family: 'Roboto', sans-serif;
  /* Light purple per Meeting 8 Elizabeth feedback (was dark navy/purple gradient) */
  background:
    radial-gradient(ellipse at 80% 75%, rgba(151,231,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 20%, rgba(255,255,255,0.35) 0%, transparent 50%),
    linear-gradient(135deg, #F9F5FF 0%, #D2CCFF 55%, #BFB6F5 100%);
  position: relative;
}

/* MAG logo — upper right (stays out of tagline's upper-left placement) */
.logo-wrapper {
  position: absolute;
  top: 55px;
  right: 110px;
  width: 300px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Tagline — upper-LEFT, horizontal, larger, with margin from edges so it clears Rob's head area */
.tagline {
  position: absolute;
  top: 60px;      /* margin from top */
  left: 80px;     /* margin from left */
  max-width: 560px;
  font-family: 'Roboto', sans-serif;
  font-size: 30px;
  font-weight: 500;
  letter-spacing: 2px;
  line-height: 1.3;
  text-transform: uppercase;
  color: #2A3A56; /* navy on light purple — high legibility */
}

.tagline .accent {
  color: #4A3B63; /* deep purple for the separators */
}
</style>
</head>
<body>
  <div class="tagline">
    Dream Boldly<br>
    <span class="accent">·</span> Embrace Your Diversity<br>
    <span class="accent">·</span> Unleash Brilliance
  </div>
  <div class="logo-wrapper">
    <img class="logo" src="../../original-images-unused/MAG%20Logo%20without%20BG.png" alt="My Autism Gifts" />
  </div>
</body>
</html>
