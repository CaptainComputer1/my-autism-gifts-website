<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; }
body {
  background:
    radial-gradient(ellipse at 20% 15%, rgba(120,95,160,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(55,40,80,0.4) 0%, transparent 60%),
    linear-gradient(155deg, #55436e 0%, #4A3B63 45%, #3d2f55 100%);
  position: relative;
}

/* Small persistent butterfly anchor bottom-right */
.butterfly-anchor {
  position: absolute;
  bottom: 55px;
  right: 65px;
  width: 84px;
  height: 84px;
  opacity: 0.88;
  filter: drop-shadow(0 2px 10px rgba(200,180,60,0.3));
}
</style>
</head>
<body>
  <img class="butterfly-anchor" src="../../MAG%20Logo%20Square%20Icon%20without%20BG.png" alt="" />
</body>
</html>
