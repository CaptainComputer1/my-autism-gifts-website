<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #2A3A56 0%, #3a4d6e 40%, #4A3B63 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Subtle pattern overlay */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(151,231,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 30%, rgba(210,204,255,0.06) 0%, transparent 50%);
}

/* Decorative butterfly watermark top-right */
.watermark {
  position: absolute;
  top: -60px;
  right: -40px;
  width: 500px;
  height: 500px;
  opacity: 0.06;
  mix-blend-mode: screen;
}

.watermark-bl {
  position: absolute;
  bottom: -80px;
  left: -60px;
  width: 400px;
  height: 400px;
  opacity: 0.05;
  transform: rotate(180deg);
  mix-blend-mode: screen;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

.logo {
  width: 480px;
  height: auto;
  border-radius: 20px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.3);
}

.tagline {
  font-size: 28px;
  font-weight: 300;
  color: rgba(255,255,255,0.85);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #97E7FF, transparent);
}

.subtitle {
  font-size: 22px;
  color: #97E7FF;
  font-weight: 400;
  letter-spacing: 1px;
}

/* Bottom accent bar */
.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #53A0B7, #97E7FF, #D2CCFF, #4A3B63);
}
</style>
</head>
<body>
  <img class="watermark" src="../MAG%20Logo%20Square%20Icon%20without%20BG.png" alt="" />
  <img class="watermark-bl" src="../MAG%20Logo%20Square%20Icon%20without%20BG.png" alt="" />

  <div class="content">
    <img class="logo" src="../MAG%20Logo.png" alt="My Autism Gifts" />
    <div class="divider"></div>
    <div class="tagline">Dream boldly · Embrace Your Diversity · Unleash Brilliance</div>
    <div class="subtitle">Life Coaching for Autistic & Neurodivergent Adults</div>
  </div>

  <div class="bottom-bar"></div>
</body>
</html>
